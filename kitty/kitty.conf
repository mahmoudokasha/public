# Fonts
font_family JetBrains Mono
font_features JetBrainsMono-Regular +calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08
font_features JetBrainsMono-Bold +calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08
font_features JetBrainsMono-Italic +calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08
font_features JetBrainsMono-BoldItalic +calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08
undercurl_style thick-dense

# Cursor
cursor #f5c2e7
cursor_text_color #1e1e2e
cursor_beam_thickness 1.5
cursor_stop_blinking_after 15.0
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# Scrollback
scrollback_lines 10000
scrollback_pager_history_size 10

# Mouse
mouse_hide_wait -5.0
url_color #f5c2e7
copy_on_select clipboard

# Bell
enable_audio_bell no
visual_bell_duration 0.3

# Window
remember_window_position yes
window_padding_width 4
active_border_color #f5c2e7
inactive_border_color #313244
inactive_text_alpha 0.85
hide_window_decorations titlebar-only

# Tab bar
tab_bar_margin_width 4.0
tab_bar_margin_height 4.0 4.0
tab_bar_style powerline
tab_bar_min_tabs 1
tab_powerline_style round
active_tab_foreground   #1e1e2e
active_tab_background   #f5c2e7
active_tab_font_style   bold-italic
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
inactive_tab_font_style normal

# Colors
foreground #cdd6f4
background #1e1e2e
background_blur 20
background_image background.png
background_image_layout cscaled
selection_foreground #1e1e2e
selection_background #f5c2e7

color0  #45475a
color8  #585b70
color1  #f38ba8
color9  #f38ba8
color2  #a6e3a1
color10 #a6e3a1
color3  #f9e2af
color11 #f9e2af
color4  #89b4fa
color12 #89b4fa
color5  #f5c2e7
color13 #f5c2e7
color6  #94e2d5
color14 #94e2d5
color7  #bac2de
color15 #a6adc8

# Remote control
allow_remote_control yes

# Notifications
notify_on_cmd_finish unfocused

# Keyboard shortcuts
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+alt+f focus_visible_window

map ctrl+shift+z scroll_to_prompt -1
map ctrl+shift+x scroll_to_prompt 1
map ctrl+shift+h show_scrollback
map ctrl+shift+g show_last_command_output
map ctrl+shift+/ search_scrollback

map ctrl+shift+e open_url_with_hints
map ctrl+shift+p>f kitten hints --type path --program -
map ctrl+shift+p>w kitten hints --type word --program -
map ctrl+shift+p>l kitten hints --type line --program -
map ctrl+shift+p>h kitten hints --type hash --program -
map ctrl+shift+p>y kitten hints --type hyperlink

map ctrl+shift+l next_layout
map ctrl+shift+alt+t toggle_layout tall
map ctrl+shift+alt+s toggle_layout stack

map ctrl+shift+a>m set_background_opacity +0.05
map ctrl+shift+a>l set_background_opacity -0.05
map ctrl+shift+a>1 set_background_opacity 1
map ctrl+shift+a>d set_background_opacity 1.0

map ctrl+shift+f5 load_config_file
map ctrl+shift+delete clear_terminal reset active
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0
