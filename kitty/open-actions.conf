# Click a directory → cd into it and list contents
protocol file
mime inode/directory
action send_text normal,application cd ${FILE_PATH}\rls\r

# Click a text file → open in $EDITOR
protocol file
mime text/*,application/*
action send_text normal,application $EDITOR ${FILE_PATH}\r

# Click an image → show with icat
protocol file
mime image/*
action send_text normal,application kitty +kitten icat ${FILE_PATH}\r
